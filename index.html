<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#080808" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MTWDC Match Night" />
<title>MTWDC W6 Match Night</title>
<style>
:root {
  --bg: #080808;
  --panel: rgba(38,38,42,.92);
  --line: rgba(255,255,255,.13);
  --text: #f4f1ee;
  --muted: #b7b0ab;
  --orange: #ff914d;
  --lime: #d7ff73;
  --red: #ff655c;
  --shadow: rgba(0,0,0,.42);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "Roboto Condensed", Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 8% 0%, rgba(255,145,77,.24), transparent 18rem),
    linear-gradient(155deg, #050505 0%, #171719 58%, #090909 100%);
  min-height: 100vh;
  letter-spacing: .03em;
}
body:before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.027) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: radial-gradient(circle at center, black, transparent 78%);
}
.app {
  max-width: 980px;
  margin: 0 auto;
  padding: 14px;
  padding-bottom: 30px;
}
.card {
  background: linear-gradient(180deg, rgba(44,44,48,.95), rgba(20,20,22,.92));
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: 0 18px 60px var(--shadow);
  overflow: hidden;
}
.hero {
  padding: 18px;
}
.brand {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 12px;
  align-items: center;
}
.logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  border-radius: 50%;
  background: #050505;
  border: 2px solid var(--orange);
  box-shadow: 0 0 0 4px rgba(255,145,77,.12);
}
.eyebrow {
  color: var(--orange);
  font-size: 12px;
  letter-spacing: .16em;
  text-transform: uppercase;
}
h1 {
  margin: 7px 0 0;
  font-size: clamp(34px, 9vw, 64px);
  line-height: .9;
  text-transform: uppercase;
  font-style: italic;
}
h1 span { color: var(--orange); display:block; }
.controls {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}
label {
  display: block;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 12px;
  letter-spacing: .04em;
  margin-bottom: 5px;
  text-transform: uppercase;
}
select, input {
  width: 100%;
  background: #101012;
  border: 2px solid rgba(255,145,77,.45);
  color: var(--text);
  border-radius: 13px;
  padding: 13px 14px;
  outline: none;
  font-family: Arial, sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0;
}
.scoreboard {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.scoreBox {
  padding: 16px;
  border-radius: 19px;
  background: rgba(255,255,255,.065);
  border: 1px solid rgba(255,255,255,.09);
  text-align: center;
}
.scoreLabel {
  font-family: Arial, sans-serif;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.scoreValue {
  font-size: 76px;
  line-height: .85;
  margin-top: 8px;
  font-style: italic;
}
.good { color: var(--lime); }
.bad { color: var(--red); }
.status {
  margin-top: 10px;
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,145,77,.11);
  border: 1px solid rgba(255,145,77,.28);
  font-family: Arial, sans-serif;
  letter-spacing: 0;
  line-height: 1.42;
}
.status b {
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
  letter-spacing: .04em;
  color: var(--orange);
  font-size: 22px;
}
.toolbar {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 12px;
  letter-spacing: 0;
}
button {
  border: 0;
  border-radius: 13px;
  padding: 11px 13px;
  font-family: Arial, sans-serif;
  font-weight: 900;
  cursor: pointer;
}
.secondary {
  background: rgba(255,255,255,.1);
  color: var(--text);
  border: 1px solid rgba(255,255,255,.12);
}
.section {
  margin-top: 12px;
  padding: 16px;
}
.sectionTitle {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.sectionTitle h2 {
  margin: 0;
  font-size: 26px;
  text-transform: uppercase;
  font-style: italic;
}
.sectionTitle span {
  color: var(--orange);
  font-family: Arial, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .09em;
}
.games {
  display: grid;
  gap: 10px;
}
.game {
  background: rgba(255,255,255,.062);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 16px;
  padding: 12px;
}
.gameHeader {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.gameTitle {
  font-family: Arial, sans-serif;
  letter-spacing: 0;
  font-weight: 900;
  color: var(--text);
}
.gameMeta {
  font-family: Arial, sans-serif;
  letter-spacing: 0;
  color: var(--muted);
  font-size: 12px;
  margin-top: 3px;
}
.resultButtons {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.resultButtons button {
  min-height: 44px;
  background: rgba(255,255,255,.09);
  color: var(--text);
  border: 1px solid rgba(255,255,255,.11);
}
.resultButtons button.win.active {
  background: var(--lime);
  color: #111;
}
.resultButtons button.loss.active {
  background: var(--red);
  color: #111;
}
.resultButtons button.blank.active {
  background: var(--orange);
  color: #111;
}
.resultPill {
  display: inline-grid;
  place-items: center;
  min-width: 42px;
  height: 34px;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-weight: 900;
  letter-spacing: 0;
}
.resultPill.W { background: var(--lime); color: #111; }
.resultPill.L { background: var(--red); color: #111; }
.error {
  margin-top: 10px;
  display: none;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,101,92,.13);
  border: 1px solid rgba(255,101,92,.32);
  color: #ffd6d3;
  font-family: Arial, sans-serif;
  letter-spacing: 0;
  line-height: 1.4;
}
.loading {
  opacity: .65;
  pointer-events: none;
}
.footerNote {
  margin-top: 12px;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 12px;
  letter-spacing: 0;
  text-align: center;
}
@media (min-width: 800px) {
  .games { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 380px) {
  .scoreValue { font-size: 58px; }
  h1 { font-size: 30px; }
}

/* Match scoring grid */
.pairsGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.pairBox {
  min-height: 96px;
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.075);
  color: var(--text);
  padding: 14px;
  display: grid;
  align-content: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  text-align: center;
}

.pairBox .pairTitle {
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
  font-size: 26px;
  line-height: .9;
  color: var(--orange);
  font-style: italic;
}

.pairBox .pairNames {
  font-family: Arial, sans-serif;
  font-size: 13px;
  letter-spacing: 0;
  color: var(--muted);
  font-weight: 800;
}

.scoreGridWrap {
  overflow-x: auto;
  padding-bottom: 2px;
}

.scoreGrid {
  min-width: 640px;
  display: grid;
  grid-template-columns: 130px repeat(4, 1fr);
  gap: 10px;
  align-items: center;
}

.gridHead {
  text-align: center;
  color: var(--text);
  font-family: Arial, sans-serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
}

.playerName {
  font-family: Arial, sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.scoreCell {
  min-height: 72px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,.22);
  background: #c9dcee;
  color: #111;
  display: grid;
  place-items: center;
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
  font-size: 44px;
  font-style: italic;
  cursor: pointer;
  user-select: none;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.2);
}

.scoreCell.W,
.pairBox.W {
  background: var(--lime);
  color: #111;
  border-color: rgba(215,255,115,.95);
}

.scoreCell.L,
.pairBox.L {
  background: var(--red);
  color: #111;
  border-color: rgba(255,101,92,.95);
}

.scoreCell.saving,
.pairBox.saving {
  opacity: .55;
}

.tapHint {
  margin-top: 8px;
  color: var(--muted);
  font-family: Arial, sans-serif;
  font-size: 12px;
  letter-spacing: 0;
}

@media (max-width: 720px) {
  .pairsGrid {
    grid-template-columns: 1fr;
  }

  .scoreGrid {
    min-width: 520px;
    grid-template-columns: 108px repeat(4, 92px);
    gap: 8px;
  }

  .scoreCell {
    min-height: 62px;
    font-size: 36px;
    border-radius: 12px;
  }

  .gridHead {
    font-size: 13px;
  }

  .playerName {
    font-size: 14px;
  }
}

</style>
</head>

  <section class="scoreboard">
    <div class="scoreBox">
      <div class="scoreLabel" id="teamLabel">MTWDC W6</div>
      <div class="scoreValue good" id="winsCount">0</div>

      <div class="scoreLabel">Opposition</div>
      <div class="scoreValue bad" id="lossesCount">0</div>

  <section class="status" id="statusBox"><b>Loading...</b><br>Choose a round to start scoring.</section>

  <section class="card section">
    <div class="sectionTitle"><h2>Singles</h2><span id="singlesCount">Tap box to cycle</span></div>
    <div class="games" id="singlesGames"></div>

  <div class="footerNote">Results save to the Match_Night_Live tab. Each round is stored separately.</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzfs-Qd9A5PcQTg5zjiDzvnmoRUFB_iEjsgg5gVuViZ9XPJvpv7Y32mtzke-BpRJ5AM/exec";
let config = {};
let rounds = [];
let currentRound = null;
let currentScores = [];
let refreshTimer = null;
let saving = false;

const els = {
  roundSelect: document.getElementById("roundSelect"),
  errorBox: document.getElementById("errorBox"),
  winsCount: document.getElementById("winsCount"),
  lossesCount: document.getElementById("lossesCount"),
  teamLabel: document.getElementById("teamLabel"),
  statusBox: document.getElementById("statusBox"),
  lastUpdated: document.getElementById("lastUpdated"),
  pairsGames: document.getElementById("pairsGames"),
  singlesGames: document.getElementById("singlesGames"),
  pairsCount: document.getElementById("pairsCount"),
  singlesCount: document.getElementById("singlesCount"),
  refreshBtn: document.getElementById("refreshBtn")
};

function getDeviceId() {
  let id = localStorage.getItem("mtwdcDeviceId");
  if (!id) {
    id = "device_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem("mtwdcDeviceId", id);
  }
  return id;
}

function saveLocalSettings() {
  localStorage.setItem("mtwdcSelectedRound", els.roundSelect.value);
}

function loadLocalSettings() {
  // No scorer details needed.
}

function showError(message) {
  els.errorBox.style.display = message ? "block" : "none";
  els.errorBox.textContent = message || "";
}

function setLoading(isLoading) {
  document.body.classList.toggle("loading", isLoading);
}

async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
  const response = await fetch(url.toString(), { cache: "no-store" });
  if (!response.ok) throw new Error("API request failed: " + response.status);
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || "API error");
  return data;
}

async function apiPost(body) {
  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(body)
  });
  if (!response.ok) throw new Error("API request failed: " + response.status);
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || "API error");
  return data;
}

function scoreMap() {
  const map = new Map();
  currentScores.forEach(score => map.set(score.gameId, score));
  return map;
}

function scoreFor(gameId) {
  const score = scoreMap().get(gameId);
  return score ? score.result : "";
}

function calcScore() {
  const wins = currentScores.filter(s => s.result === "W").length;
  const losses = currentScores.filter(s => s.result === "L").length;
  return {
    wins,
    losses,
    played: wins + losses,
    remaining: Number(config.Match_Total_Games || 18) - wins - losses,
    winTarget: Number(config.Wins_For_Win || 10),
    drawTarget: Number(config.Wins_For_Draw || 9)
  };
}

function updateStatus() {
  const s = calcScore();
  els.winsCount.textContent = s.wins;
  els.lossesCount.textContent = s.losses;
  els.teamLabel.textContent = config.Team_Name || "MTWDC W6";

  let headline = "Match in progress";
  let detail = `${s.wins} won, ${s.losses} lost. ${Math.max(0, s.remaining)} games remaining.`;

  if (s.wins >= s.winTarget) {
    headline = "Match win secured";
    detail = `${s.wins} won, ${s.losses} lost. Play out the remaining games.`;
  } else if (s.losses >= s.winTarget) {
    headline = "Match loss confirmed";
    detail = `${s.wins} won, ${s.losses} lost. Play out the remaining games.`;
  } else if (s.wins >= s.drawTarget) {
    headline = "Draw secured";
    detail = `${s.wins} won, ${s.losses} lost. ${s.winTarget - s.wins} more win takes the match.`;
  } else {
    const winsForWin = Math.max(0, s.winTarget - s.wins);
    const winsForDraw = Math.max(0, s.drawTarget - s.wins);
    detail = `${s.wins} won, ${s.losses} lost. ${winsForWin} more wins for a match win, ${winsForDraw} more for a draw.`;
  }

  els.statusBox.innerHTML = `<b>${headline}</b><br>${detail}`;
}

function nextResult(current) {
  if (current === "") return "W";
  if (current === "W") return "L";
  return "";
}

function renderGames() {
  if (!currentRound) return;

  const pairs = currentRound.games.filter(g => g.gameType === "Pair");
  const singles = currentRound.games.filter(g => g.gameType === "Singles");

  els.pairsCount.textContent = `${pairs.length} game${pairs.length === 1 ? "" : "s"}`;
  els.singlesCount.textContent = `${singles.length} games`;

  renderPairsGrid(pairs);
  renderSinglesGrid(singles);
  updateStatus();
}

function renderPairsGrid(pairs) {
  if (!pairs.length) {
    els.pairsGames.innerHTML = `<div class="tapHint">No pairs found for this round.</div>`;
    return;
  }

  els.pairsGames.innerHTML = `
    <div class="pairsGrid">
      ${pairs.map(pairTemplate).join("")}
    </div>
    <div class="tapHint">Tap a pair box to cycle Blank → W → L.</div>
  `;

  document.querySelectorAll("[data-pair-box]").forEach(box => {
    box.addEventListener("click", async () => {
      const gameId = box.dataset.gameId;
      const game = currentRound.games.find(g => g.gameId === gameId);
      const current = scoreFor(gameId);
      await saveResult(game, nextResult(current), box);
    });
  });
}

function pairTemplate(game) {
  const result = scoreFor(game.gameId);
  const label = result || "";
  const names = game.player2 ? `${game.player1} + ${game.player2}` : game.player1;

  return `
    <div class="pairBox ${result}" data-pair-box data-game-id="${game.gameId}">
      <div class="pairTitle">${label || game.gameLabel}</div>
      <div class="pairNames">${names}</div>
    </div>
  `;
}

function renderSinglesGrid(singles) {
  if (!singles.length) {
    els.singlesGames.innerHTML = `<div class="tapHint">No singles found for this round.</div>`;
    return;
  }

  const playerMap = new Map();

  singles.forEach(game => {
    if (!playerMap.has(game.player1)) playerMap.set(game.player1, []);
    playerMap.get(game.player1).push(game);
  });

  const rows = [...playerMap.entries()].map(([player, games]) => {
    games.sort((a, b) => gameNumberFromLabel(a.gameLabel) - gameNumberFromLabel(b.gameLabel));

    const cells = [1, 2, 3, 4].map(gameNum => {
      const game = games.find(g => gameNumberFromLabel(g.gameLabel) === gameNum);
      if (!game) return `<div></div>`;

      const result = scoreFor(game.gameId);
      return `
        <button class="scoreCell ${result}" data-score-cell data-game-id="${game.gameId}" aria-label="${player} Game ${gameNum}">
          ${result}
        </button>
      `;
    }).join("");

    return `
      <div class="playerName">${player}</div>
      ${cells}
    `;
  }).join("");

  els.singlesGames.innerHTML = `
    <div class="scoreGridWrap">
      <div class="scoreGrid">
        <div></div>
        <div class="gridHead">Game 1</div>
        <div class="gridHead">Game 2</div>
        <div class="gridHead">Game 3</div>
        <div class="gridHead">Game 4</div>
        ${rows}
      </div>
    </div>
    <div class="tapHint">Tap a box to cycle Blank → W → L.</div>
  `;

  document.querySelectorAll("[data-score-cell]").forEach(cell => {
    cell.addEventListener("click", async () => {
      const gameId = cell.dataset.gameId;
      const game = currentRound.games.find(g => g.gameId === gameId);
      const current = scoreFor(gameId);
      await saveResult(game, nextResult(current), cell);
    });
  });
}

function gameNumberFromLabel(label) {
  const match = String(label || "").match(/Game\s+(\d+)/i);
  return match ? Number(match[1]) : 0;
}

async function saveResult(game, result, element) {
  if (saving) return;
  showError("");

  saving = true;
  if (element) element.classList.add('saving');

  try {
    saveLocalSettings();

    const data = await apiPost({
      action: "saveResult",
      round: currentRound.round,
      gameId: game.gameId,
      gameType: game.gameType,
      gameLabel: game.gameLabel,
      player1: game.player1,
      player2: game.player2 || "",
      result,
      updatedBy: "Match Night App",
      deviceId: getDeviceId(),
      notes: ""
    });

    currentScores = data.scores || [];
    els.lastUpdated.textContent = "Saved " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    renderGames();
  } catch (error) {
    showError(error.message);
  } finally {
    saving = false;
    if (element) element.classList.remove('saving');
  }
}

async function loadScores() {
  if (!currentRound) return;
  const data = await apiGet("getScores", { round: currentRound.round });
  currentScores = data.scores || [];
  els.lastUpdated.textContent = "Updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  renderGames();
}

async function loadRound(roundName) {
  showError("");
  setLoading(true);

  try {
    const data = await apiGet("getRound", { round: roundName });
    currentRound = data.round;
    await loadScores();

    const label = currentRound.opponent ? `${currentRound.round} - ${currentRound.opponent}` : currentRound.round;
    document.title = label + " | MTWDC Match Night";
  } catch (error) {
    showError(error.message);
  } finally {
    setLoading(false);
  }
}

async function init() {
  loadLocalSettings();
  showError("");
  setLoading(true);

  try {
    const [configData, roundsData] = await Promise.all([
      apiGet("getConfig"),
      apiGet("getRounds")
    ]);

    config = configData.config || {};
    rounds = roundsData.rounds || [];

    els.teamLabel.textContent = config.Team_Name || "MTWDC W6";

    els.roundSelect.innerHTML = "";
    rounds.forEach(round => {
      const option = document.createElement("option");
      option.value = round.round;
      option.textContent = `${round.round} - ${round.opponent || "No opponent yet"}`;
      els.roundSelect.appendChild(option);
    });

    const savedRound = localStorage.getItem("mtwdcSelectedRound");
    if (savedRound && rounds.some(r => r.round === savedRound)) {
      els.roundSelect.value = savedRound;
    }

    if (rounds.length) {
      await loadRound(els.roundSelect.value);
    } else {
      showError("No rounds found in Main Sheet.");
    }

    const refreshSeconds = Math.max(3, Number(config.Refresh_Seconds || 5));
    refreshTimer = setInterval(() => {
      loadScores().catch(error => showError(error.message));
    }, refreshSeconds * 1000);

  } catch (error) {
    showError(error.message);
  } finally {
    setLoading(false);
  }
}

els.roundSelect.addEventListener("change", () => {
  saveLocalSettings();
  loadRound(els.roundSelect.value);
});

els.refreshBtn.addEventListener("click", () => {
  loadScores().catch(error => showError(error.message));
});

init();
</script>
</body>
</html>
